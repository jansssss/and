# AES-256 암호화 후 GitHub Pages 배포
name: Encrypt & Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Encrypt index.html with AES-256
        run: |
          staticrypt index.html \
            --password "$SITE_PASSWORD" \
            --output . \
            --remember 7 \
            --template-title "퇴직연금 분석 대시보드" \
            --template-instructions "접근 권한이 필요합니다. 비밀번호를 입력하세요." \
            --template-color-primary "#e94560" \
            --template-color-secondary "#1a1a2e"
          echo "=== Encryption check ==="
          head -3 index.html
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
