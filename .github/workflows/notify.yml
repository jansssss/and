name: Slack Reminder - 퇴직금 실행 예정일

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (= 00:00 UTC)
  workflow_dispatch:       # 수동 실행 (테스트용)

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run diagnosis
        run: python scripts/diagnose.py

      - name: Commit diagnosis result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagnosis_result.json
          git diff --staged --quiet || git commit -m "chore: update diagnosis $(date +'%Y-%m-%d %H:%M KST')"
          git push

      - name: Check and Send Slack Notification
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID:   ${{ secrets.SLACK_USER_ID }}
        run: python scripts/notify_slack.py
