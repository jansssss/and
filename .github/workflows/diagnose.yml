name: 투자 진단 수동 실행

on:
  workflow_dispatch:   # 수동 실행 전용 (자동 진단은 notify.yml에 통합)

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run diagnosis
        run: python scripts/diagnose.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagnosis_result.json
          git diff --staged --quiet || git commit -m "chore: update diagnosis $(date +'%Y-%m-%d %H:%M KST')"
          git push
